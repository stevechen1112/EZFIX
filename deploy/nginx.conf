# Nginx 設定範本
# 複製到 /etc/nginx/sites-available/henghui
# 然後：sudo ln -s /etc/nginx/sites-available/henghui /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name ezfix.com.tw www.ezfix.com.tw;  # ← 改成你的網域
    # 若用 Cloudflare，記得把真實 IP 傳給後端（讓 Next.js 知道訪客 IP）

    client_max_body_size 10M;

    # 強制 HTTPS（憑證生效後啟用）
    # return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ezfix.com.tw www.ezfix.com.tw;  # ← 改成你的網域

    client_max_body_size 10M;

    # SSL 由 certbot 自動產生
    ssl_certificate     /etc/letsencrypt/live/ezfix.com.tw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ezfix.com.tw/privkey.pem;

    # 上傳目錄直接由 Nginx 提供（效能較好）
    location /uploads/ {
        alias /var/www/henghui/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Next.js 靜態檔案
    location /_next/static/ {
        alias /var/www/henghui/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 反向代理到 Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
